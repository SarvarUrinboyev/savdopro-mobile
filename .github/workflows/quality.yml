name: Mobile quality

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: mobile-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript / Expo
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Type-check application
        run: npm run typecheck
